<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.2" baseProfile="tiny" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- White background -->
  <rect width="500" height="500" fill="#ffffff"/>

  <!-- M shape - left leg -->
  <polygon points="60,380 60,120 130,120 250,260 370,120 440,120 440,380 370,380 370,220 250,360 130,220 130,380" fill="url(#grad-m)"/>

  <!-- Plus sign - horizontal bar -->
  <rect x="355" y="210" width="130" height="55" rx="4" fill="#1a3a8f"/>
  <!-- Plus sign - vertical bar -->
  <rect x="393" y="172" width="55" height="130" rx="4" fill="#1a3a8f"/>

  <!-- Circuit lines -->
  <!-- Top center line -->
  <line x1="250" y1="120" x2="250" y2="68" stroke="#29b89a" stroke-width="7" stroke-linecap="round"/>
  <circle cx="250" cy="58" r="12" fill="none" stroke="#29b89a" stroke-width="7"/>

  <!-- Left branch -->
  <line x1="200" y1="155" x2="200" y2="100" stroke="#29b89a" stroke-width="7" stroke-linecap="round"/>
  <line x1="200" y1="100" x2="155" y2="100" stroke="#29b89a" stroke-width="7" stroke-linecap="round"/>
  <circle cx="143" cy="100" r="12" fill="none" stroke="#29b89a" stroke-width="7"/>

  <!-- Right branch -->
  <line x1="300" y1="155" x2="300" y2="100" stroke="#29b89a" stroke-width="7" stroke-linecap="round"/>
  <line x1="300" y1="100" x2="345" y2="100" stroke="#29b89a" stroke-width="7" stroke-linecap="round"/>
  <circle cx="357" cy="100" r="12" fill="none" stroke="#29b89a" stroke-width="7"/>

  <!-- Bottom center line -->
  <line x1="250" y1="360" x2="250" y2="430" stroke="#1a3a8f" stroke-width="7" stroke-linecap="round"/>
  <line x1="250" y1="430" x2="210" y2="430" stroke="#1a3a8f" stroke-width="7" stroke-linecap="round"/>
  <circle cx="198" cy="430" r="12" fill="none" stroke="#1a3a8f" stroke-width="7"/>

  <!-- Middle right branch -->
  <line x1="310" y1="270" x2="355" y2="270" stroke="#29b89a" stroke-width="7" stroke-linecap="round"/>
  <circle cx="367" cy="270" r="12" fill="none" stroke="#29b89a" stroke-width="7"/>

  <defs>
    <linearGradient id="grad-m" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#29b89a"/>
      <stop offset="100%" stop-color="#1a3a8f"/>
    </linearGradient>
  </defs>
</svg>

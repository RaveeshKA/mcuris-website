<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Request a demo — mCuris</title>
  <meta name="description" content="See mCuris live. Tell us about your team and we'll tailor the walkthrough." />
  <link rel="icon" type="image/png" href="assets/mcuris-mark.png" />
  <link rel="stylesheet" href="shared/colors_and_type.css" />
  <link rel="stylesheet" href="shared/site.css" />
  <style>
    @media (max-width: 900px) {
      .contact-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
    }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      font-family: var(--font-sans);
      font-size: 15px;
      padding: 12px 14px;
      border: 1px solid var(--border-default);
      border-radius: 8px;
      background: #fff;
      color: var(--fg-1);
      transition: all 140ms var(--ease-standard);
      box-shadow: var(--shadow-inset);
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      outline: none;
      border-color: var(--brand-teal);
      box-shadow: var(--shadow-focus);
    }
    .form-textarea { resize: vertical; min-height: 100px; line-height: 1.55; }
    .form-label {
      display: block;
      font-size: 13px; font-weight: 700;
      color: var(--fg-1);
      margin-bottom: 6px;
    }
    .form-sub {
      font-size: 12.5px; color: var(--fg-3); margin-top: 4px;
    }
    .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 12px; border-radius: 999;
      border: 1px solid var(--border-default); background: #fff;
      font-size: 12.5px; font-weight: 600; color: var(--fg-2);
      cursor: pointer; transition: all 140ms;
      user-select: none;
    }
    .chip:hover { border-color: var(--brand-deep-blue-300); }
    .chip.on {
      background: var(--brand-deep-blue);
      border-color: var(--brand-deep-blue);
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="shared/icons.jsx"></script>
  <script type="text/babel" src="shared/ui.jsx"></script>
  <script type="text/babel" src="shared/products.jsx"></script>
  <script type="text/babel" src="shared/AppDownload.jsx"></script>
  <script type="text/babel" src="shared/Layout.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    function ContactHero() {
      return (
        <section style={{
          background: "var(--brand-gradient-soft)",
          borderBottom: "1px solid var(--border-subtle)",
          paddingTop: 80, paddingBottom: 48,
        }}>
          <div className="shell">
            <LpEyebrow>Request a demo</LpEyebrow>
            <h1 style={{
              margin: "16px 0 0",
              fontFamily: "var(--font-display)", fontWeight: 800,
              fontSize: "clamp(36px, 5vw, 56px)", lineHeight: 1.05,
              letterSpacing: "-0.025em", textWrap: "balance",
            }}>
              See mCuris live — tailored to your team.
            </h1>
            <p style={{
              margin: "20px 0 0", maxWidth: 680,
              fontSize: 18, lineHeight: 1.55, color: "var(--fg-2)", textWrap: "pretty",
            }}>
              Tell us a bit about your practice. We'll show you the surfaces that matter most for your specialty and answer the hard questions on the call.
            </p>
          </div>
        </section>
      );
    }

    function DemoForm() {
      const [submitted, setSubmitted] = useState(false);
      const [form, setForm] = useState({
        name: "", email: "", org: "", role: "",
        org_type: "Practice", team_size: "1–10",
        products: [],
        timeline: "Exploring",
        notes: "",
      });

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const toggleProduct = (id) => {
        set("products", form.products.includes(id)
          ? form.products.filter(p => p !== id)
          : [...form.products, id]);
      };

      const submit = (e) => {
        e.preventDefault();
        // Real form would POST. For now, optimistic UI.
        setSubmitted(true);
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      if (submitted) {
        return (
          <div style={{
            padding: 48, background: "#fff", border: "1px solid var(--brand-teal-300)",
            borderRadius: 16, textAlign: "center",
            boxShadow: "var(--shadow-md)",
          }}>
            <span style={{
              width: 56, height: 56, borderRadius: "50%",
              background: "var(--brand-teal-50)",
              color: "var(--brand-teal-700)",
              display: "inline-flex", alignItems: "center", justifyContent: "center",
              margin: "0 auto 20px",
            }}>
              <LpIcon name="check" size={28} strokeWidth={2.5} />
            </span>
            <h3 className="ds-h4" style={{ margin: 0 }}>Request received.</h3>
            <p style={{ margin: "12px 0 0", color: "var(--fg-2)", fontSize: 16, maxWidth: 480, marginLeft: "auto", marginRight: "auto", lineHeight: 1.55 }}>
              A real human will reach out within one business day to schedule the walkthrough. We'll come prepared with the surfaces that match what you selected.
            </p>
            <div style={{ marginTop: 24, fontSize: 13, color: "var(--fg-3)" }}>
              Need to reach us sooner? <a href="mailto:hello@mcuris.health" style={{ color: "var(--brand-deep-blue)", fontWeight: 700 }}>hello@mcuris.health</a>
            </div>
            <button
              onClick={() => { setSubmitted(false); setForm({ name: "", email: "", org: "", role: "", org_type: "Practice", team_size: "1–10", products: [], timeline: "Exploring", notes: "" }); }}
              style={{
                marginTop: 28, padding: "10px 18px", borderRadius: 8,
                border: "1px solid var(--border-default)", background: "#fff",
                fontSize: 13, fontWeight: 700, color: "var(--fg-2)", cursor: "pointer",
              }}>
              Send another request
            </button>
          </div>
        );
      }

      return (
        <form onSubmit={submit} style={{
          padding: 32, background: "#fff",
          border: "1px solid var(--border-subtle)", borderRadius: 16,
        }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
            <div>
              <label className="form-label">Full name *</label>
              <input className="form-input" required value={form.name} onChange={e => set("name", e.target.value)} placeholder="Dr. Jane Patel" />
            </div>
            <div>
              <label className="form-label">Work email *</label>
              <input className="form-input" type="email" required value={form.email} onChange={e => set("email", e.target.value)} placeholder="jane@hospital.org" />
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
            <div>
              <label className="form-label">Organization *</label>
              <input className="form-input" required value={form.org} onChange={e => set("org", e.target.value)} placeholder="Riverbend Health" />
            </div>
            <div>
              <label className="form-label">Your role</label>
              <input className="form-input" value={form.role} onChange={e => set("role", e.target.value)} placeholder="CMIO, Chief of Cardiology, …" />
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 24 }}>
            <div>
              <label className="form-label">Organization type</label>
              <select className="form-select" value={form.org_type} onChange={e => set("org_type", e.target.value)}>
                <option>Solo practice</option>
                <option>Practice</option>
                <option>Multi-site group</option>
                <option>Community hospital</option>
                <option>Health system / IDN</option>
                <option>Ambulance / EMS agency</option>
                <option>Reference lab</option>
                <option>Pharmacy</option>
                <option>Other</option>
              </select>
            </div>
            <div>
              <label className="form-label">Approx. clinical team size</label>
              <select className="form-select" value={form.team_size} onChange={e => set("team_size", e.target.value)}>
                <option>1–10</option>
                <option>11–50</option>
                <option>51–200</option>
                <option>201–1,000</option>
                <option>1,000+</option>
              </select>
            </div>
          </div>

          <div style={{ marginBottom: 24 }}>
            <label className="form-label">Which surfaces are you most interested in? <span style={{ color: "var(--fg-3)", fontWeight: 500 }}>(pick any)</span></label>
            <div className="chip-row" style={{ marginTop: 8 }}>
              {PRODUCTS.map(p => {
                const on = form.products.includes(p.id);
                return (
                  <button
                    key={p.id} type="button"
                    onClick={() => toggleProduct(p.id)}
                    className={`chip ${on ? "on" : ""}`}>
                    <LpIcon name={p.icon} size={13} />
                    {p.name.replace("mCuris ", "")}
                    {on && <LpIcon name="check" size={12} strokeWidth={3} />}
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{ marginBottom: 24 }}>
            <label className="form-label">Timeline</label>
            <div className="chip-row" style={{ marginTop: 8 }}>
              {["Exploring", "Evaluating (3-6 mo)", "Active eval (now)", "RFP issued"].map(t => {
                const on = form.timeline === t;
                return (
                  <button
                    key={t} type="button"
                    onClick={() => set("timeline", t)}
                    className={`chip ${on ? "on" : ""}`}>
                    {t}
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{ marginBottom: 28 }}>
            <label className="form-label">Anything else we should know?</label>
            <textarea className="form-textarea" value={form.notes} onChange={e => set("notes", e.target.value)} placeholder="Current EMR, biggest pain points, integrations you need…" />
            <div className="form-sub">We read every note. Helps us send you to the right specialist.</div>
          </div>

          <button type="submit" className="btn btn-primary btn-lg" style={{ width: "100%", justifyContent: "center" }}>
            Send request
            <LpIcon name="arrowRight" size={15} />
          </button>
          <div style={{ marginTop: 16, fontSize: 12.5, color: "var(--fg-3)", textAlign: "center", lineHeight: 1.55 }}>
            We respect your inbox. No marketing emails unless you opt in. By submitting, you agree to our{" "}
            <a href="security.html#privacy" style={{ color: "var(--brand-deep-blue)", fontWeight: 700 }}>privacy policy</a>.
          </div>
        </form>
      );
    }

    function ContactSide() {
      return (
        <aside style={{ display: "flex", flexDirection: "column", gap: 24 }}>
          <div style={{
            padding: 28, background: "radial-gradient(ellipse at 20% 0%, #1E4E8F 0%, #14335C 50%, #0F2643 100%)", color: "#fff",
            borderRadius: 16, position: "relative", overflow: "hidden",
          }}>
            <svg aria-hidden style={{ position: "absolute", top: 0, right: 0, width: 160, height: 160, opacity: 0.18 }} viewBox="0 0 160 160" fill="none">
              <g stroke="#2EC4B6" strokeWidth="0.8">
                <path d="M160 30 L120 30 L120 70 L80 70" />
                <circle cx="80" cy="70" r="3" fill="#2EC4B6" />
              </g>
            </svg>
            <div style={{ position: "relative" }}>
              <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: "0.10em", textTransform: "uppercase", color: "var(--brand-teal-300)", marginBottom: 18 }}>
                What happens next
              </div>
              <ol style={{ listStyle: "none", padding: 0, margin: 0, display: "flex", flexDirection: "column", gap: 16 }}>
                {[
                  { num: "1", t: "We reply within a business day.", b: "A real person — not a sequence." },
                  { num: "2", t: "30-min discovery call.", b: "We learn your stack and current pain. No pitch deck." },
                  { num: "3", t: "Tailored live walkthrough.", b: "Surfaces matched to your specialty and team." },
                  { num: "4", t: "Sandbox tenant if you want to click around.", b: "No card, no obligation." },
                ].map(s => (
                  <li key={s.num} style={{ display: "flex", gap: 14 }}>
                    <span style={{
                      width: 28, height: 28, flexShrink: 0,
                      borderRadius: "50%",
                      background: "var(--brand-teal)", color: "#0F2643",
                      display: "inline-flex", alignItems: "center", justifyContent: "center",
                      fontWeight: 800, fontSize: 13,
                    }}>{s.num}</span>
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>{s.t}</div>
                      <div style={{ fontSize: 13, color: "rgba(255,255,255,0.7)", marginTop: 2 }}>{s.b}</div>
                    </div>
                  </li>
                ))}
              </ol>
            </div>
          </div>

          <div style={{
            padding: 24, background: "#fff",
            border: "1px solid var(--border-subtle)", borderRadius: 14,
            display: "flex", flexDirection: "column", gap: 16,
          }}>
            <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: "0.10em", textTransform: "uppercase", color: "var(--brand-teal-700)" }}>
              Other ways to reach us
            </div>
            {[
              { icon: "mail",   l: "hello@mcuris.health", s: "General inquiries", href: "mailto:hello@mcuris.health" },
              { icon: "shield", l: "security@mcuris.health", s: "Security & vulnerability reports", href: "mailto:security@mcuris.health" },
              { icon: "briefcase", l: "careers@mcuris.health", s: "Careers — see the about page for roles", href: "mailto:careers@mcuris.health" },
            ].map(c => (
              <a key={c.l} href={c.href} style={{
                display: "flex", alignItems: "center", gap: 12,
                padding: "12px 14px", borderRadius: 10,
                background: "var(--bg-app)",
                transition: "all 140ms var(--ease-standard)",
              }}
              onMouseEnter={(e) => e.currentTarget.style.background = "var(--bg-brand-soft)"}
              onMouseLeave={(e) => e.currentTarget.style.background = "var(--bg-app)"}>
                <LpIcon name={c.icon} size={18} color="var(--brand-deep-blue)" />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13.5, fontWeight: 700, color: "var(--fg-1)", fontFamily: "var(--font-mono)" }}>{c.l}</div>
                  <div style={{ fontSize: 12, color: "var(--fg-3)" }}>{c.s}</div>
                </div>
                <LpIcon name="arrowUpRight" size={13} color="var(--fg-4)" />
              </a>
            ))}
          </div>

          <div id="signin" style={{
            padding: 24, background: "var(--bg-accent-soft)",
            border: "1px solid var(--brand-teal-200)", borderRadius: 14,
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <LpIcon name="user" size={16} color="var(--brand-teal-800)" />
              <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: "0.10em", textTransform: "uppercase", color: "var(--brand-teal-800)" }}>
                Already a customer?
              </div>
            </div>
            <p style={{ margin: 0, fontSize: 13.5, color: "var(--fg-2)", lineHeight: 1.55 }}>
              Sign in to your tenant at <span style={{ fontFamily: "var(--font-mono)", fontWeight: 700, color: "var(--brand-deep-blue)" }}>[your-org].mcuris.health</span>, or contact your customer success team directly.
            </p>
          </div>
        </aside>
      );
    }

    function App() {
      return (
        <>
          <SiteNav active="contact" />
          <main>
            <ContactHero />
            <section style={{ padding: "64px 0 96px" }}>
              <div className="shell">
                <div style={{
                  display: "grid", gridTemplateColumns: "minmax(0, 1.4fr) minmax(0, 1fr)",
                  gap: 40, alignItems: "start",
                }} className="contact-grid">
                  <DemoForm />
                  <ContactSide />
                </div>
              </div>
            </section>
          </main>
          <SiteFooter />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

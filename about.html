<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>About — mCuris</title>
  <meta name="description" content="The EMR became a billing tool. mCuris is rebuilding the clinical surface as a decision-support copilot." />
  <link rel="icon" type="image/png" href="assets/mcuris-mark.png" />
  <link rel="stylesheet" href="shared/colors_and_type.css" />
  <link rel="stylesheet" href="shared/site.css" />
  <style>
    @media (max-width: 880px) {
      .mission-grid, .principles-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="shared/icons.jsx"></script>
  <script type="text/babel" src="shared/ui.jsx"></script>
  <script type="text/babel" src="shared/products.jsx"></script>
  <script type="text/babel" src="shared/AppDownload.jsx"></script>
  <script type="text/babel" src="shared/Layout.jsx"></script>
  <script type="text/babel" src="landing/Sections.jsx"></script>
  <script type="text/babel" src="landing/MyCarePhone.jsx"></script>
  <script type="text/babel" src="landing/EcosystemDiagram.jsx"></script>
  <script type="text/babel" src="shared/ChartPreview.jsx"></script>

  <script type="text/babel">
    function AboutHero() {
      return (
        <section className="page-hero">
          <div className="shell">
            <LpEyebrow>About mCuris</LpEyebrow>
            <h1>Built so clinicians can spend less time in software, more time with patients.</h1>
            <p>
              The EMR became a billing tool. mCuris is rebuilding the clinical surface from scratch — as a decision-support copilot, not a paperwork machine.
            </p>
          </div>
        </section>
      );
    }

    function MissionSection() {
      return (
        <section className="section" id="mission">
          <div className="shell">
            <div style={{
              display: "grid", gridTemplateColumns: "minmax(0, 0.9fr) minmax(0, 1.1fr)",
              gap: 64, alignItems: "start",
            }} className="mission-grid">
              <div>
                <LpEyebrow>Our mission</LpEyebrow>
                <h2 className="ds-h2" style={{ margin: "16px 0 0", fontSize: "clamp(30px, 4vw, 42px)" }}>
                  End <span className="ds-text-gradient">death-by-a-thousand-clicks</span>.
                </h2>
              </div>
              <div>
                <p style={{ fontSize: 18, lineHeight: 1.65, color: "var(--fg-2)", marginTop: 0 }}>
                  Every clinician we've talked to says the same thing: the chart was supposed to be a thinking tool, and it became a billing system with a stethoscope strapped to it. Click, click, click, ten more clicks, save, sign — and the patient is already in the next room.
                </p>
                <p style={{ fontSize: 18, lineHeight: 1.65, color: "var(--fg-2)" }}>
                  mCuris is what happens when you take the chart back. We are building a connected clinical platform that respects the clinician's time, the patient's understanding, and the institution's trust. One shared record. Six clean surfaces. Zero preventable errors from missing context.
                </p>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function PrinciplesSection() {
      const principles = [
        { num: "01", title: "Subtract before you add",
          body: "Every screen we ship is graded on how many clicks it removed, not how many it added." },
        { num: "02", title: "Refuse walled gardens",
          body: "Interoperability is a feature, not a roadmap item. FHIR-native, HL7-fluent, open API on every surface." },
        { num: "03", title: "Build for the 2 AM shift",
          body: "Decisions are tested against the tiredest, least-charitable user we can imagine — and adjusted accordingly." },
        { num: "04", title: "Stability over speed",
          body: "Clinical software does not ship at 5 PM on a Friday. Every change to a clinical surface gets staged rollout." },
        { num: "05", title: "Own bugs in public",
          body: "When something breaks, the incident report goes out the same week. No PR euphemisms." },
        { num: "06", title: "The patient owns the data",
          body: "Patients can export their record at any time in a standard FHIR bundle. No exit fees, no exit drama." },
      ];
      return (
        <section className="section" style={{ background: "var(--bg-app)", borderTop: "1px solid var(--border-subtle)" }}>
          <div className="shell">
            <LpSectionHead
              eyebrow="How we work"
              title="Six principles we hold ourselves to."
              lede="These aren't slogans on a wall. They are constraints — and yes, sometimes they slow us down. That's the point."
            />
            <div style={{
              marginTop: 56,
              display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 16,
            }} className="principles-grid">
              {principles.map(p => (
                <div key={p.num} style={{
                  padding: 28, borderRadius: 14,
                  background: "#fff", border: "1px solid var(--border-subtle)",
                }}>
                  <div style={{
                    fontFamily: "var(--font-mono)", fontSize: 13, fontWeight: 700,
                    color: "var(--brand-teal-700)", letterSpacing: "0.06em",
                  }}>
                    {p.num}
                  </div>
                  <h3 className="ds-h5" style={{ margin: "12px 0 10px", fontSize: 19 }}>{p.title}</h3>
                  <p style={{ margin: 0, fontSize: 15, lineHeight: 1.6, color: "var(--fg-2)" }}>{p.body}</p>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function StorySection() {
      return (
        <section className="section">
          <div className="shell-narrow">
            <LpEyebrow>The why</LpEyebrow>
            <h2 className="ds-h2" style={{ margin: "16px 0 32px", fontSize: "clamp(28px, 4vw, 40px)" }}>
              Why we started.
            </h2>
            <div style={{ fontSize: 18, lineHeight: 1.75, color: "var(--fg-2)", display: "flex", flexDirection: "column", gap: 20 }}>
              <p style={{ margin: 0 }}>
                The vision started simply enough: a clinician should be able to walk into a patient's room knowing what changed in the last six hours — not three days, not since last shift, but six hours. That should be the default. It isn't.
              </p>
              <p style={{ margin: 0 }}>
                We watched ER physicians spend a quarter of their shift in front of a screen. We watched pharmacists hand-reconcile medication lists from three different sources because no one system trusts the others. We watched ambulance crews radio in patient details that wouldn't make it to the receiving doctor for thirty minutes. Each handoff is a place where context dies — and where the next-shift clinician inherits a problem they didn't create.
              </p>
              <p style={{ margin: 0 }}>
                mCuris is what we wished existed when we were on the other side of the chart. It's still early, and we've got a lot to build. But the thesis is simple: connect the people who care for the patient, give them one shared truth, and get out of their way.
              </p>
            </div>
            <div style={{
              marginTop: 48, padding: 32,
              background: "var(--brand-gradient-soft)", borderRadius: 16,
              borderLeft: "3px solid var(--brand-teal)",
            }}>
              <LpIcon name="quote" size={28} color="var(--brand-teal-700)" />
              <p style={{
                margin: "12px 0 0",
                fontSize: 22, lineHeight: 1.5, fontWeight: 600,
                color: "var(--fg-1)", letterSpacing: "-0.01em",
                fontFamily: "var(--font-display)",
              }}>
                Liberating clinicians from clunky software so they can get back to actually practicing medicine.
              </p>
              <div style={{ marginTop: 16, fontSize: 13, fontWeight: 700, color: "var(--brand-deep-blue-700)", letterSpacing: "0.06em", textTransform: "uppercase" }}>
                Our founding thesis
              </div>
            </div>
          </div>
        </section>
      );
    }

    function CareersSection() {
      return (
        <section className="section" id="careers" style={{ background: "radial-gradient(ellipse at 20% 0%, #1E4E8F 0%, #14335C 50%, #0F2643 100%)", color: "#fff" }}>
          <div className="shell">
            <div style={{
              display: "grid", gridTemplateColumns: "minmax(0, 1fr) minmax(0, 1fr)",
              gap: 56, alignItems: "center",
            }} className="mission-grid">
              <div>
                <div style={{ display: "inline-flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                  <span style={{ width: 24, height: 1, background: "var(--brand-teal-300)" }} />
                  <span style={{ fontSize: 11, fontWeight: 800, letterSpacing: "0.10em", textTransform: "uppercase", color: "var(--brand-teal-300)" }}>Careers</span>
                </div>
                <h2 style={{
                  margin: 0, fontFamily: "var(--font-display)", fontWeight: 800,
                  fontSize: "clamp(28px, 4vw, 40px)", letterSpacing: "-0.02em", lineHeight: 1.1,
                  color: "#fff",
                }}>
                  Build the clinical software you wish you had.
                </h2>
                <p style={{ fontSize: 17, lineHeight: 1.6, color: "rgba(255,255,255,0.8)", marginTop: 20, textWrap: "pretty" }}>
                  We're hiring engineers, clinical informaticists, designers, and security folks. If you've ever sat through a chart-shift in an ED, or stared at a med-rec screen that hasn't been touched since 2007, we want to talk.
                </p>
                <a href="mailto:careers@mcuris.health" className="btn btn-accent" style={{ marginTop: 28 }}>
                  careers@mcuris.health
                  <LpIcon name="arrowRight" size={14} />
                </a>
              </div>
              <div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  {["Engineering", "Clinical Informatics", "Design", "Security", "Sales & Partnerships", "Customer Success"].map(role => (
                    <div key={role} style={{
                      padding: "16px 18px",
                      background: "rgba(255,255,255,0.05)",
                      border: "1px solid rgba(255,255,255,0.08)",
                      borderRadius: 10,
                      display: "flex", alignItems: "center", justifyContent: "space-between",
                    }}>
                      <span style={{ fontSize: 14, fontWeight: 600, color: "rgba(255,255,255,0.92)" }}>{role}</span>
                      <span style={{ fontSize: 11, fontWeight: 700, color: "var(--brand-teal-300)", letterSpacing: "0.06em", textTransform: "uppercase" }}>Hiring</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function App() {
      return (
        <>
          <SiteNav active="about" />
          <main>
            <AboutHero />
            <MissionSection />
            <ValuesSection />
            <PrinciplesSection />
            <StorySection />
            <CareersSection />
            <CtaBanner />
          </main>
          <SiteFooter />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
